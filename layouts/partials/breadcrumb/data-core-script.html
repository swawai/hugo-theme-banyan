<script>
(function () {
    if (window.__banyanBreadcrumbData) {
        return;
    }

    function safeDecode(value) {
        if (typeof value !== 'string' || value === '') {
            return '';
        }

        try {
            return decodeURIComponent(value);
        } catch (error) {
            return value;
        }
    }

    function normalizeFromPath(value) {
        if (typeof value !== 'string') {
            return '';
        }

        var decoded = safeDecode(value.trim());
        var segments = decoded.split('/').filter(Boolean);
        if (segments.length === 0) {
            return '';
        }

        return '/' + segments.join('/') + '/';
    }

    function normalizePathname(pathname) {
        if (typeof pathname !== 'string' || pathname === '') {
            return '/';
        }

        var normalized = pathname.endsWith('/') ? pathname : pathname + '/';
        return normalized === '//' ? '/' : normalized;
    }

    function normalizeCollectionSource(source) {
        if (!source || typeof source !== 'object') {
            return null;
        }

        var logicalPath = normalizeFromPath(source.logical_path || source.logicalPath || '');
        var provider = typeof source.provider === 'string' ? source.provider.trim().toLowerCase() : '';
        var sortVariant = typeof (source.sort_variant || source.sortVariant) === 'string'
            ? (source.sort_variant || source.sortVariant).trim().toLowerCase()
            : '';
        var defaultSort = typeof (source.default_sort || source.defaultSort) === 'string'
            ? (source.default_sort || source.defaultSort).trim().toLowerCase()
            : '';

        if (!logicalPath && !provider && !sortVariant && !defaultSort) {
            return null;
        }

        var normalized = {};
        if (logicalPath) {
            normalized.logicalPath = logicalPath;
        }
        if (provider) {
            normalized.provider = provider;
        }
        if (sortVariant) {
            normalized.sortVariant = sortVariant;
        }
        if (defaultSort) {
            normalized.defaultSort = defaultSort;
        }

        return normalized;
    }

    function normalizeItemsPayload(payload) {
        if (!payload || typeof payload !== 'object') {
            return null;
        }

        var fields = Array.isArray(payload.f)
            ? payload.f.filter(function (field) {
                return typeof field === 'string' && field.trim() !== '';
            })
            : [];
        var rowVector = Array.isArray(payload.rv) ? payload.rv : [];
        if (fields.length === 0 || rowVector.length % fields.length !== 0) {
            return null;
        }

        return payload;
    }

    function normalizeLinkItem(item) {
        if (!item || typeof item !== 'object') {
            return null;
        }

        var text = typeof item.text === 'string' ? item.text.trim() : '';
        var href = typeof item.href === 'string' ? item.href.trim() : '';
        if (!text || !href) {
            return null;
        }

        var normalized = { text: text, href: href };
        if (typeof item.title === 'string' && item.title.trim() !== '') {
            normalized.title = item.title.trim();
        }
        if (typeof item.current === 'boolean') {
            normalized.current = item.current;
        }
        if (typeof item.selected === 'boolean') {
            normalized.selected = item.selected;
        }
        if (typeof item.highlighted === 'boolean') {
            normalized.highlighted = item.highlighted;
        }
        if (typeof item.redundant_with_root_menu === 'boolean') {
            normalized.redundant_with_root_menu = item.redundant_with_root_menu;
        }
        if (typeof item.redundantWithRootMenu === 'boolean') {
            normalized.redundant_with_root_menu = item.redundantWithRootMenu;
        }
        if (typeof item.menu_button_label === 'string' && item.menu_button_label.trim() !== '') {
            normalized.menu_button_label = item.menu_button_label.trim();
        }
        if (Array.isArray(item.menu)) {
            var menuItems = item.menu.map(normalizeLinkItem).filter(Boolean);
            if (menuItems.length > 0) {
                normalized.menu = menuItems;
            }
        }

        return normalized;
    }

    function parseEntryBreadcrumbSources(rawValue) {
        try {
            var parsed = JSON.parse(rawValue);
            if (!Array.isArray(parsed)) {
                return [];
            }

            return parsed.map(function (source) {
                if (!source || typeof source !== 'object') {
                    return null;
                }

                var logicalPath = normalizeFromPath(source.logical_path || source.logicalPath || '');
                var rootItem = normalizeLinkItem(source.root_item || source.rootItem);
                if (!logicalPath || !rootItem) {
                    return null;
                }

                var rootMenuRaw = Array.isArray(source.root_menu || source.rootMenu) ? (source.root_menu || source.rootMenu) : [];
                var tailItemsRaw = Array.isArray(source.tail_items || source.tailItems) ? (source.tail_items || source.tailItems) : [];
                var levelsRaw = Array.isArray(source.levels) ? source.levels : [];

                return {
                    provider: typeof source.provider === 'string' ? source.provider.trim().toLowerCase() : '',
                    logicalPath: logicalPath,
                    rootItem: rootItem,
                    rootMenuItems: rootMenuRaw.map(normalizeLinkItem).filter(Boolean),
                    rootMenuLabel: typeof (source.root_menu_label || source.rootMenuLabel) === 'string'
                        ? (source.root_menu_label || source.rootMenuLabel).trim()
                        : '',
                    tailItems: tailItemsRaw.map(normalizeLinkItem).filter(Boolean),
                    levels: levelsRaw.map(function (level) {
                        if (!level || typeof level !== 'object') {
                            return null;
                        }

                        var item = normalizeLinkItem(level.item);
                        if (!item) {
                            return null;
                        }

                        var normalized = { item: item };
                        var collectionSource = normalizeCollectionSource(level.collection_source || level.collectionSource);
                        if (collectionSource) {
                            normalized.collectionSource = collectionSource;
                        }
                        var collectionItems = normalizeItemsPayload(level.collection_items || level.collectionItems);
                        if (collectionItems) {
                            normalized.collectionItems = collectionItems;
                        }

                        return normalized;
                    }).filter(Boolean),
                    currentCollectionSource: normalizeCollectionSource(
                        source.current_collection_source || source.currentCollectionSource
                    ),
                    currentCollectionItems: normalizeItemsPayload(
                        source.current_collection_items || source.currentCollectionItems
                    )
                };
            }).filter(Boolean);
        } catch (error) {
            return [];
        }
    }

    function isEntryKeySafe(value) {
        return typeof value === 'string' && value !== '' && value !== '.' && value !== '..' && !/[/?#]/.test(value);
    }

    function parseEntrySelection(sources, fromPath) {
        var normalized = normalizeFromPath(fromPath);
        if (!normalized || !Array.isArray(sources) || sources.length === 0) {
            return null;
        }

        var sortedSources = sources.slice().sort(function (left, right) {
            return right.logicalPath.length - left.logicalPath.length;
        });

        for (var index = 0; index < sortedSources.length; index += 1) {
            var source = sortedSources[index];
            if (!source || normalized.indexOf(source.logicalPath) !== 0) {
                continue;
            }

            var remainder = normalized.slice(source.logicalPath.length);
            var parts = remainder.split('/').filter(Boolean);
            if (parts.length !== 1) {
                continue;
            }

            var entryKey = parts[0];
            if (!isEntryKeySafe(entryKey)) {
                return null;
            }

            return {
                source: source,
                entryKey: entryKey
            };
        }

        return null;
    }

    function pickSourceByLogicalPath(sources, logicalPath) {
        var normalized = normalizeFromPath(logicalPath);
        if (!normalized || !Array.isArray(sources)) {
            return null;
        }

        for (var index = 0; index < sources.length; index += 1) {
            var source = sources[index];
            if (source && source.logicalPath === normalized) {
                return source;
            }
        }

        return null;
    }

    window.__banyanBreadcrumbData = {
        normalizeFromPath: normalizeFromPath,
        normalizePathname: normalizePathname,
        normalizeCollectionSource: normalizeCollectionSource,
        parseEntryBreadcrumbSources: parseEntryBreadcrumbSources,
        parseEntrySelection: parseEntrySelection,
        pickSourceByLogicalPath: pickSourceByLogicalPath
    };
})();
</script>
