{{- $entries := .entries | default (slice) -}}
{{- if gt (len $entries) 0 -}}
{{- $items := slice -}}
{{- range $i, $e := $entries -}}
  {{- $items = $items | append (dict
      "@type" "ListItem"
      "position" (add $i 1)
      "url" $e.url
      "name" $e.name
  ) -}}
{{- end -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ItemList",
  "itemListElement": {{ $items | jsonify | safeJS }}
}
</script>
{{- end -}}
