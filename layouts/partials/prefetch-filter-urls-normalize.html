{{- $raw := printf "%v" . -}}
{{- $url := "" -}}
{{- if and $raw (not (hasPrefix $raw "http://")) (not (hasPrefix $raw "https://")) -}}
  {{- $trimmed := index (split $raw "#") 0 -}}
  {{- if and $trimmed (hasPrefix $trimmed "/") -}}
    {{- $url = $trimmed -}}
  {{- end -}}
{{- end -}}
{{- return $url -}}
