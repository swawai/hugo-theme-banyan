{{ $class := .class }}
{{ $href := .href }}
{{ $title := .title }}
{{ $label := .label }}
{{ $text := .text }}
{{ $ctx := .ctx }}
{{ with $href }}
<span class="{{ $class }} header">
  {{ partial "link.html" (dict "ctx" $ctx "href" . "label" $label "text" $text "safeHTML" true "linkSlot" "sort") }}
</span>
{{ end }}
