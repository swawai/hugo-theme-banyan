# -------------------------------------------------------------------
# Banyan Theme - Example Site Configuration
# -------------------------------------------------------------------
# INSTRUCTIONS:
# Copy this entire file to your Hugo project's root directory and
# rename it to `hugo.toml` (replacing your existing one).
# Then customize the values under "Site-Specific Overrides" to match your site.
# -------------------------------------------------------------------

baseURL = 'http://localhost:1313/'
languageCode = 'en-us'
title = 'Your Site Name'
theme = "banyan"
preserveTaxonomyNames = true
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
timeZone = "Asia/Shanghai"

enableGitInfo = false
panicOnWarning = true

[params]
# If account_url is empty or commented out, the login button will ONLY show the logo and link to the Banyan theme GitHub repo.
# If configured, it will show the "Account" text and link to the specified URL.
# account_url = "https://your-account-link.com"
# copyright = "your copyright here"
# icp = "your icp here"

#[params.link_prefetch]
# Prefetch mode short codes:
#   "" / "off" = disable this slot
#   transport:
#     spec = Speculation Rules
#     link = rel=prefetch
#     sw   = Service Worker warmup
#   eagerness:
#     s = conservative
#     m = moderate
#     x = eager
#   kind:
#     f = prefetch
#     r = prerender
#   examples:
#     spec_sf / spec_mf / spec_xf
#     spec_xf_g
#     spec_sr / spec_mr / spec_xr
#     link_sf / link_mf / link_xf
#     sw_sf   / sw_mf   / sw_xf
#   global gate:
#     append _g = sessionStorage-backed global-once gate;
#     the same warmup payload only runs once per browsing session
#
# Slot guidance:
#   menu is usually best with "*-prefetch" / "*-prerender" / "*_g"
#   sort_siblings is usually best with "*-prefetch"
#   descendants is usually best with "" / "*-prefetch"
#   post is usually best with "" / "*-prefetch" / "*-prerender"
#   nav is usually best with "" / "*-prefetch"
#
# Explicit environment tables:
#   [params.link_prefetch.env.TTT]
#   [params.link_prefetch.env.FTT]
#   ...
# To reuse another env profile, optionally add:
#   ref = "FTT"
# Reference expansion happens at build time; runtime still receives
# fully expanded actions.
#
# T/F bits mean:
#   1 = Speculation Rules transport available
#   2 = rel=prefetch transport available
#   3 = Service Worker API available in the current context
#       This only checks final SW API availability.
#       It does not require an active worker to be ready, and it does
#       not add a separate site-side policy gate.
#
# Hugo compiles each explicit env profile directly into page-local
# prefetch action data. A shared runtime script picks the matching env
# at runtime. If an env profile references an unavailable transport,
# Hugo fails at build time instead of leaving fallback logic to runtime.
# There is no guarantee that link/spec transports will write into or hit
# Service Worker caches. When SW is available, prefer SW warmup if you
# need deterministic SW cache population and offline support.
#
# Runtime payload short codes:
#   sp = speculation rules payload
#   sg = speculation rules payload with global gate
#   ls / lm / lx = link transport conservative / moderate / eager
#   lsg / lmg / lxg = link transport with global gate
#   ws / wm / wx = SW transport conservative / moderate / eager
#   wsg / wmg / wxg = SW transport with global gate
#   site-prefetch-data deduplicates identical final actions.
#   When two envs resolve to the same actions, the later one is emitted
#   as a direct alias string to the earlier concrete env key.
#
# Runtime assignment rule:
#   Candidates are deduplicated globally in this order:
#   menu > nav > sort_siblings > descendants > post
#   The first matching slot wins for a given URL.
#
# Debugging tip:
#   Open the content anchor page /prefetchdebug/ to inspect browser
#   capability detection, page payload, and the prefetch resources injected
#   into the page.
#
# Example:
# [params.link_prefetch.env.TTT]
# menu = "spec_xr_g"
# nav = "spec_xr"
# sort_siblings = "spec_xr"
# descendants = "link_xf"
# post = "sw_xf"

#[params.social]
# github = "https://github.com/your-github"

#[params.service_worker]
# mode = "enable"
# version = "202603110001"
# Asset caching routes, SW cache behavior, CDN headers, and platform-specific
# header outputs are all driven by the root-level cache-policy.json file.
# Hugo renders public/_headers and public/edgeone.json directly; keep the
# repo-root edgeone.json synced via your npm/bun scripts.
# Keep this section focused on SW lifecycle settings such as mode/version.

#[params.runtime_i18n]
# Runtime UI copy fallback chain for shared assets such as SW update prompts.
# Keys and values should use lowercase language tags.
# fallbacks = { "zh-hk" = "zh-tw", "zh-mo" = "zh-tw" }

[frontmatter]
lastmod = ["lastmod", ":git", ":fileModTime", ":default"]

[pagination]
pagerSize = 30
[taxonomies]
udc = "udc"
tag = "tags"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.minify]
disableXML = true

[outputFormats]
[outputFormats.byname]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-name"
[outputFormats.bynameasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-name-asc"
[outputFormats.bydate]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
#path      = "by-date"
[outputFormats.bydateasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-date-asc"
[outputFormats.bycount]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-count"
[outputFormats.bycountasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "by-count-asc"
[outputFormats.allbydate]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-date"
[outputFormats.allbydateasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-date-asc"
[outputFormats.allbypath]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-path"
[outputFormats.allbypathasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-path-asc"
[outputFormats.allbyname]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-name"
[outputFormats.allbynameasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-name-asc"
[outputFormats.allbysize]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-size"
[outputFormats.allbysizeasc]
mediaType = "text/html"
isHTML    = true
baseName  = "index"
path      = "all-by-size-asc"
[outputs]
section  = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss"]
home     = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss"]
taxonomy = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","rss"]
term     = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","rss"]

[languages]
[languages.en]
languageName = "English"
weight = 1
[languages.en.outputs]
section  = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss"]
home     = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","allbyname","allbynameasc","allbydate","allbydateasc","allbypath","allbypathasc","allbysize","allbysizeasc","rss"]
taxonomy = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","rss"]
term     = ["byname","bynameasc","bydate","bydateasc","bycount","bycountasc","rss"]
[languages.en.params]
description = "Your English site description here."
locale = "en_US"

[languages.zh]
languageName = "中文"
weight = 2
[languages.zh.params]
description = "在此处填写您的中文网站描述。"
locale = "zh_CN"

[languages.zh-tw]
languageName = "繁體"
weight = 3
[languages.zh-tw.params]
description = "在此處填寫您的繁體中文網站描述。"
locale = "zh_TW"

[permalinks]
mypost = "/p/:slug/"
blog = "/p/:slug/"
