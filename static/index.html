<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    (function () {
      /**
       * 智能语言重定向（static/index.html）
       * ─────────────────────────────────────
       * 1. 优先使用用户之前在语言切换器中选择并存入 localStorage 的偏好
       * 2. 其次根据浏览器 navigator.languages 逐一匹配站点支持的语言
       * 3. 语言列表通过 fetch 探测 /{lang}/i18n.json 动态发现，无需硬编码
       * 4. 方言归并映射与 main.js 保持一致（zh-hk/zh-mo → zh-tw）
       */

      // ── 方言归并（与 main.js normalizeLang 一致）──
      var normalize = function (code) {
        code = code.toLowerCase();
        if (code === 'zh-hk' || code === 'zh-mo') return 'zh-tw';
        return code;
      };

      // ── 获取基础路径（兼容部署在子目录的情况）──
      var base = window.location.pathname.replace(/index\.html$/, '');
      if (base.charAt(base.length - 1) !== '/') base += '/';

      // ── 通过 Hugo 生成的 lang-list.json 获取真实支持语言列表 ──
      // 为避免解析 HTML / sitemap，这里直接依赖 Hugo 的 JSON 输出：
      // layouts/index.langlist.json -> /{lang}/lang-list.json
      //
      // 由于本项目 defaultContentLanguage = "en"，且 defaultContentLanguageInSubdir = true，
      // 根入口可以固定从 /en/lang-list.json 读取一次权威语言列表。
      fetch(base + 'en/lang-list.json', { credentials: 'same-origin' })
        .then(function (res) { return res && res.ok ? res.json() : []; })
        .then(function (list) {
          var available = Array.isArray(list)
            ? list.map(function (item) { return (item.code || '').toLowerCase(); }).filter(Boolean)
            : [];

          if (available.length === 0) {
            // 兜底：没有拿到语言列表时，至少保证能进英文站
            window.location.replace(base + 'en/');
            return;
          }

          var target = null;

        // 1) localStorage 里是否存有用户偏好（与 main.js 共享 key）
        try {
          var pref = localStorage.getItem('preferred_lang');
          if (pref && available.indexOf(pref) !== -1) {
            target = pref;
          }
        } catch (e) { /* 隐私模式可能抛异常 */ }

        // 2) 按浏览器语言优先级逐一匹配
        if (!target) {
          var langs = (navigator.languages && navigator.languages.length)
            ? navigator.languages
            : [navigator.language || navigator.userLanguage || ''];

          for (var i = 0; i < langs.length; i++) {
            var code = normalize(langs[i].toLowerCase());
            // 精确匹配
            if (available.indexOf(code) !== -1) { target = code; break; }
            // 前缀匹配（如 en-US → en）
            var prefix = code.split('-')[0];
            if (available.indexOf(prefix) !== -1) { target = prefix; break; }
          }
        }

          // 3) 兜底：使用第一个可用语言（通常是 defaultContentLanguage）
          if (!target) target = available[0];

          window.location.replace(base + target + '/');
        })
        .catch(function () {
          // 极端情况下（比如 JSON 输出缺失），退回最简单策略
          window.location.replace(base + 'en/');
        });
    })();
  </script>
</head>
<body>
  Redirecting…
</body>
</html>
