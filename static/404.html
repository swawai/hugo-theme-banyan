<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>404 Not Found</title>
  <script>
    (function () {
      /**
       * 静态路由 404 智能分发中心（配合 Hugo i18njson）
       * ─────────────────────────────────────────────────────────────
       * 1. CF/EdgeOne 等平台会把所有未命中的请求统一返回根目录 /404.html
       * 2. 如果 URL 已带语言前缀（/zh/xxx/），优先在该语言下渲染 Hugo 生成的 /{lang}/404.html
       * 3. 如果 URL 未带语言前缀（/tags/），根据缓存 + 浏览器语言选择一个“可用语言”，跳转到 /{lang}/...
       * 4. “可用语言”列表通过探测 /{lang}/i18n.json 得到，完全由 Hugo 配置驱动
       */

      // 与 main.js / static/index.html 保持一致的方言归并
      var normalize = function (code) {
        code = (code || '').toLowerCase();
        if (code === 'zh-hk' || code === 'zh-mo') return 'zh-tw';
        return code;
      };

      // 通过 Hugo 生成的 /lang-list.json 获取真实支持语言列表
      function detectAvailableLangs() {
        return fetch('/lang-list.json', { credentials: 'same-origin' })
          .then(function (res) { return res && res.ok ? res.json() : []; })
          .then(function (list) {
            if (!Array.isArray(list)) return [];
            return list
              .map(function (item) { return (item.code || '').toLowerCase(); })
              .filter(Boolean);
          })
          .catch(function () { return []; });
      }

      // 拉取 Hugo 生成的 404 页面并渲染
      function tryFetchAndWrite(lang) {
        fetch('/' + lang + '/404.html')
          .then(function (res) {
            if (res.ok) return res.text();
            // 找不到当前语言的 404，退回到英文或兜底文本
            return fetch('/en/404.html').then(function (r) {
              return r && r.ok ? r.text() : '<h1>404 Not Found</h1>';
            });
          })
          .then(function (html) {
            document.open();
            document.write(html);
            document.close();
          })
          .catch(function () {
            document.body.innerHTML = '<h1 style="text-align:center;margin-top:20vh;font-family:sans-serif;">404 Not Found</h1>';
          });
      }

      var path = window.location.pathname;

      // 一、URL 已带语言前缀：/zh/... 或 /zh-tw/...
      var m = path.match(/^\/([a-z]{2}(?:-[a-z0-9]{2,4})?)\//i);
      if (m) {
        var langFromPath = normalize(m[1]);

        detectAvailableLangs().then(function (available) {
          if (!available.length) {
            // 没有任何语言的 i18n.json，直接兜底
            document.body.innerHTML = '<h1 style="text-align:center;margin-top:20vh;font-family:sans-serif;">404 Not Found</h1>';
            return;
          }

          var lang = langFromPath;
          if (available.indexOf(lang) === -1) {
            // 路径里的语言不在 Hugo 支持列表中，优先回退到 en，其次列表第一个
            if (available.indexOf('en') !== -1) lang = 'en';
            else lang = available[0];
          }

          tryFetchAndWrite(lang);
        });

        return;
      }

      // 二、URL 未带语言前缀：根据缓存 + 浏览器语言选择一个“可用语言”，然后跳转
      detectAvailableLangs().then(function (available) {
        if (!available.length) {
          document.body.innerHTML = '<h1 style="text-align:center;margin-top:20vh;font-family:sans-serif;">404 Not Found</h1>';
          return;
        }

        var target = null;

        // 1）localStorage 里的用户偏好
        try {
          var pref = localStorage.getItem('preferred_lang');
          if (pref && available.indexOf(pref) !== -1) {
            target = pref;
          }
        } catch (e) {}

        // 2）浏览器语言优先级
        if (!target) {
          var langs = (navigator.languages && navigator.languages.length)
            ? navigator.languages
            : [navigator.language || navigator.userLanguage || ''];

          for (var i = 0; i < langs.length; i++) {
            var code = normalize(langs[i]);
            // 精确匹配
            if (available.indexOf(code) !== -1) { target = code; break; }
            // 前缀匹配（如 en-US → en）
            var prefix = code.split('-')[0];
            if (available.indexOf(prefix) !== -1) { target = prefix; break; }
          }
        }

        // 3）兜底：使用第一个可用语言（通常是 defaultContentLanguage）
        if (!target) target = available[0];

        // 清除多余斜杠并跳转，例如 /tags/ → /zh/tags/
        var rest = path.replace(/^\//, '');
        window.location.replace('/' + target + '/' + rest);
      });
    })();
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
